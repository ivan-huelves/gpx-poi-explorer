<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPX Explorer - Versión Robusta</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #controls { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        #map { flex-grow: 1; }
        .status-msg { font-size: 0.9em; color: #555; font-weight: bold; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 4px; background: #007bff; color: white; }
        .btn-download { background: #28a745; }
    </style>
</head>
<body>

<div id="controls">
    <div>
        <strong>Archivo:</strong>
        <input type="file" id="gpxFile" accept=".gpx">
    </div>
    <div>
        <strong>Radio:</strong>
        <select id="radius">
            <option value="1000">1 km</option>
            <option value="5000">5 km</option>
        </select>
    </div>
    <button onclick="buscarPOIs()">Buscar lugares</button>
    <button class="btn-download" onclick="descargarGPX()">Descargar final</button>
    <div id="status" class="status-msg">Listo para empezar</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([40.4167, -3.7037], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let routeCoordinates = [];
    let foundPOIs = [];
    let gpxRawData = null;
    let trackLayer = null;
    const statusDiv = document.getElementById('status');

    document.getElementById('gpxFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            gpxRawData = event.target.result;
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(gpxRawData, "text/xml");
            
            // Extracción nativa de puntos (más resistente)
            const pts = xmlDoc.getElementsByTagName("trkpt");
            routeCoordinates = [];
            
            for (let i = 0; i < pts.length; i++) {
                routeCoordinates.push([
                    parseFloat(pts[i].getAttribute("lat")),
                    parseFloat(pts[i].getAttribute("lon"))
                ]);
            }

            if (routeCoordinates.length > 0) {
                if (trackLayer) map.removeLayer(trackLayer);
                trackLayer = L.polyline(routeCoordinates, {color: '#ff4400'}).addTo(map);
                map.fitBounds(trackLayer.getBounds());
                statusDiv.innerText = "Ruta cargada (" + routeCoordinates.length + " puntos)";
            } else {
                statusDiv.innerText = "Error: No se detectan coordenadas";
            }
        };
        reader.readAsText(file);
    });

    async function buscarPOIs() {
        if (routeCoordinates.length === 0) return alert("Sube el archivo primero");
        statusDiv.innerText = "Buscando en OpenStreetMap...";
        
        // Buscamos solo en puntos representativos para no saturar
        const step = Math.max(1, Math.floor(routeCoordinates.length / 40));
        const searchPoints = routeCoordinates.filter((_, i) => i % step === 0);
        const radius = document.getElementById('radius').value;

        for (const [lat, lon] of searchPoints) {
            const query = `[out:json];node["tourism"](around:${radius},${lat},${lon});out body;`;
            try {
                const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await response.json();
                data.elements.forEach(el => {
                    if (!foundPOIs.find(p => p.id === el.id)) {
                        foundPOIs.push(el);
                        const m = L.marker([el.lat, el.lon]).addTo(map);
                        m.bindPopup("<b>" + (el.tags.name || "Lugar") + "</b><br><button onclick='eliminar(" + el.id + ")'>Eliminar</button>");
                        el.marker = m;
                    }
                });
            } catch (e) { console.error(e); }
        }
        statusDiv.innerText = "Encontrados " + foundPOIs.length + " lugares";
    }

    window.eliminar = function(id) {
        const i = foundPOIs.findIndex(p => p.id === id);
        if (i > -1) {
            map.removeLayer(foundPOIs[i].marker);
            foundPOIs.splice(i, 1);
        }
    };

    function descargarGPX() {
        let wpts = foundPOIs.map(p => `<wpt lat="${p.lat}" lon="${p.lon}"><name>${p.tags.name || "Interés"}</name></wpt>`).join("");
        const finalGpx = gpxRawData.replace('</gpx>', wpts + '\n</gpx>');
        const blob = new Blob([finalGpx], {type: 'application/gpx+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "ruta_actualizada.gpx";
        a.click();
    }
</script>
</body>
</html>
