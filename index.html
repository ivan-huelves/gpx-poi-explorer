<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPX Pro Explorer - Garmin Ready</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #controls { padding: 15px; background: #2c3e50; color: white; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; border-bottom: 3px solid #1a252f; }
        #map { flex-grow: 1; }
        .status { font-size: 0.85em; background: #34495e; padding: 5px 10px; border-radius: 4px; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; }
        .btn-search { background: #3498db; color: white; }
        .btn-download { background: #27ae60; color: white; }
        .filter-group { display: flex; gap: 10px; background: #34495e; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="gpxFile" accept=".gpx">
    
    <select id="radius">
        <option value="1000">Radio: 1 km</option>
        <option value="3000">Radio: 3 km</option>
        <option value="5000">Radio: 5 km</option>
    </select>

    <div class="filter-group">
        <label><input type="checkbox" class="poi-filter" value="viewpoint" checked> Miradores</label>
        <label><input type="checkbox" class="poi-filter" value="fountain" checked> Fuentes</label>
        <label><input type="checkbox" class="poi-filter" value="peak" checked> Cimas</label>
        <label><input type="checkbox" class="poi-filter" value="castle,museum,monument"> Cultura</label>
    </div>

    <button class="btn-search" onclick="buscarPOIs()">Escanear Ruta</button>
    <button class="btn-download" onclick="descargarGPX()">Guardar para Garmin</button>
    <div id="status" class="status">Carga un archivo GPX</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([40.41, -3.70], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let routePoints = [];
    let pois = [];
    let originalXml = null;
    let trackLayer = null;
    const statusBox = document.getElementById('status');

    // Diccionario de símbolos Garmin
    const garminSymbols = {
        'viewpoint': 'Scenic Area',
        'fountain': 'Drinking Water',
        'peak': 'Summit',
        'castle': 'Museum',
        'museum': 'Museum',
        'monument': 'Historic Site'
    };

    document.getElementById('gpxFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            originalXml = event.target.result;
            const parser = new DOMParser();
            const xml = parser.parseFromString(originalXml, "text/xml");
            const pts = xml.getElementsByTagName("trkpt");
            
            routePoints = Array.from(pts).map(p => [
                parseFloat(p.getAttribute("lat")),
                parseFloat(p.getAttribute("lon"))
            ]);

            if (trackLayer) map.removeLayer(trackLayer);
            trackLayer = L.polyline(routePoints, {color: '#e74c3c', weight: 5}).addTo(map);
            map.fitBounds(trackLayer.getBounds());
            statusBox.innerText = "Ruta cargada (" + routePoints.length + " puntos)";
        };
        reader.readAsText(e.target.files[0]);
    });

    async function buscarPOIs() {
        if (!routePoints.length) return alert("Sube la ruta");
        const radius = document.getElementById('radius').value;
        const selected = Array.from(document.querySelectorAll('.poi-filter:checked'))
                             .map(c => c.value).join(',').split(',');

        statusBox.innerText = "Analizando ruta completa...";
        
        // Dividimos la ruta en 50 tramos iguales para asegurar cobertura total
        const step = Math.max(1, Math.floor(routePoints.length / 50));
        const scanPoints = routePoints.filter((_, i) => i % step === 0);
        
        pois = [];
        
        for (const [lat, lon] of scanPoints) {
            const types = selected.map(t => `node["tourism"="${t}"](around:${radius},${lat},${lon}); node["natural"="${t}"](around:${radius},${lat},${lon}); node["amenity"="${t}"](around:${radius},${lat},${lon}); node["historic"="${t}"](around:${radius},${lat},${lon});`).join("");
            const query = `[out:json];(${types});out body;`;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                data.elements.forEach(el => {
                    if (!pois.find(p => p.id === el.id)) {
                        const type = el.tags.tourism || el.tags.natural || el.tags.amenity || el.tags.historic;
                        el.type = type;
                        renderPOI(el);
                        pois.push(el);
                    }
                });
            } catch (err) { console.error("Error Overpass", err); }
        }
        statusBox.innerText = "Escaneo finalizado: " + pois.length + " lugares";
    }

    function renderPOI(p) {
        // Colores por tipo para el mapa
        const color = p.type === 'fountain' ? 'blue' : p.type === 'viewpoint' ? 'green' : 'orange';
        const dot = L.circleMarker([p.lat, p.lon], {radius: 8, color: color, fillOpacity: 0.8}).addTo(map);
        dot.bindPopup(`<b>${p.tags.name || 'Interés'}</b><br><small>${p.type}</small><br><button onclick="window.borrar(${p.id})">Quitar</button>`);
        p.marker = dot;
    }

    window.borrar = function(id) {
        const idx = pois.findIndex(p => p.id === id);
        if (idx > -1) {
            map.removeLayer(pois[idx].marker);
            pois.splice(idx, 1);
        }
    };

    function descargarGPX() {
        const waypointsXml = pois.map(p => {
            const sym = garminSymbols[p.type] || 'Waypoint';
            return `
    <wpt lat="${p.lat}" lon="${p.lon}">
        <name>${(p.tags.name || 'Punto').replace(/[&<>"']/g, "")}</name>
        <sym>${sym}</sym>
    </wpt>`;
        }).join("");

        const finalContent = originalXml.replace('</gpx>', waypointsXml + '\n</gpx>');
        const blob = new Blob([finalContent], {type: 'application/gpx+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "ruta_garmin_pro.gpx";
        a.click();
    }
</script>
</body>
</html>
