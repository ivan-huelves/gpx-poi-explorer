<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPX Pro Explorer - Motor BBox</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #controls { padding: 15px; background: #2c3e50; color: white; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; border-bottom: 3px solid #1a252f; }
        #map { flex-grow: 1; }
        .status { font-size: 0.85em; background: #34495e; padding: 5px 10px; border-radius: 4px; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; }
        .btn-search { background: #3498db; color: white; }
        .btn-download { background: #27ae60; color: white; }
        .filter-group { display: flex; gap: 10px; background: #34495e; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="gpxFile" accept=".gpx">
    
    <select id="radius">
        <option value="1000">Radio 1 km</option>
        <option value="3000">Radio 3 km</option>
        <option value="5000">Radio 5 km</option>
    </select>

    <div class="filter-group">
        <label><input type="checkbox" id="chk-agua" checked> Agua/Fuentes</label>
        <label><input type="checkbox" id="chk-refugio" checked> Refugios/Acampada</label>
        <label><input type="checkbox" id="chk-mirador" checked> Miradores/Cimas</label>
    </div>

    <button class="btn-search" onclick="buscarPOIs()">Escanear Ruta (BBox)</button>
    <button class="btn-download" onclick="descargarGPX()">Guardar para Garmin</button>
    <div id="status" class="status">Carga un archivo GPX</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([40.41, -3.70], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let routePoints = [];
    let pois = [];
    let originalXml = null;
    let trackLayer = null;
    const statusBox = document.getElementById('status');

    // Servidores de respaldo extraídos de tu script
    const servers = [
        "https://overpass-api.de/api/interpreter",
        "https://overpass.openstreetmap.fr/api/interpreter",
        "https://lz4.overpass-api.de/api/interpreter"
    ];

    document.getElementById('gpxFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            originalXml = event.target.result;
            const parser = new DOMParser();
            const xml = parser.parseFromString(originalXml, "text/xml");
            const pts = xml.getElementsByTagName("trkpt");
            
            routePoints = Array.from(pts).map(p => [
                parseFloat(p.getAttribute("lat")),
                parseFloat(p.getAttribute("lon"))
            ]);

            if (trackLayer) map.removeLayer(trackLayer);
            trackLayer = L.polyline(routePoints, {color: '#e74c3c', weight: 5}).addTo(map);
            map.fitBounds(trackLayer.getBounds());
            statusBox.innerText = "Ruta cargada (" + routePoints.length + " puntos)";
        };
        reader.readAsText(e.target.files[0]);
    });

    // Fórmula Haversine para medir distancias reales en la Tierra
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const rad = Math.PI / 180;
        const dLat = (lat2 - lat1) * rad;
        const dLon = (lon2 - lon1) * rad;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * rad) * Math.cos(lat2 * rad) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    async function buscarPOIs() {
        if (!routePoints.length) return alert("Sube la ruta primero");
        
        statusBox.innerText = "Calculando área delimitadora...";
        const radius = parseInt(document.getElementById('radius').value);
        
        // Calculamos la BBox de la ruta
        let minLat = 90, maxLat = -90, minLon = 180, maxLon = -180;
        routePoints.forEach(p => {
            if (p[0] < minLat) minLat = p[0];
            if (p[0] > maxLat) maxLat = p[0];
            if (p[1] < minLon) minLon = p[1];
            if (p[1] > maxLon) maxLon = p[1];
        });

        // Ampliamos la caja según el radio seleccionado
        const margin = (radius / 111000) + 0.01; 
        const bbox = `${minLat - margin},${minLon - margin},${maxLat + margin},${maxLon + margin}`;

        // Construimos la consulta según lo seleccionado
        let filtros = "";
        if (document.getElementById('chk-agua').checked) {
            filtros += `node["amenity"~"drinking_water|water_point|watering_place"](${bbox});`;
            filtros += `node["natural"="spring"](${bbox});`;
            filtros += `node["man_made"="water_tap"](${bbox});`;
        }
        if (document.getElementById('chk-refugio').checked) {
            filtros += `node["amenity"="shelter"](${bbox});`;
            filtros += `node["tourism"~"alpine_hut|wilderness_hut|camp_site"](${bbox});`;
        }
        if (document.getElementById('chk-mirador').checked) {
            filtros += `node["tourism"="viewpoint"](${bbox});`;
            filtros += `node["natural"="peak"](${bbox});`;
        }

        if (!filtros) return alert("Selecciona al menos un filtro");

        const query = `[out:json][timeout:60];(${filtros});out center;`;
        
        // Intentamos conectar con los servidores en orden
        let data = null;
        for (const url of servers) {
            statusBox.innerText = `Consultando servidor: ${url.split('//')[1].split('/')[0]}...`;
            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "data=" + encodeURIComponent(query)
                });
                if (res.ok) {
                    data = await res.json();
                    break;
                }
            } catch (err) { console.log("Fallo en", url); }
        }

        if (!data || !data.elements) {
            return statusBox.innerText = "Error: Todos los servidores están saturados.";
        }

        statusBox.innerText = `Filtrando ${data.elements.length} resultados por distancia exacta...`;
        
        // Limpiamos resultados anteriores
        pois.forEach(p => map.removeLayer(p.marker));
        pois = [];

        // Filtramos por distancia real a la ruta
        data.elements.forEach(el => {
            const lat = el.lat || (el.center && el.center.lat);
            const lon = el.lon || (el.center && el.center.lon);
            if (!lat || !lon) return;

            // Comprobamos si está a menos del radio indicado de algún punto de la ruta
            let isNear = false;
            // Para agilizar revisamos 1 de cada 10 puntos de la ruta
            for (let i = 0; i < routePoints.length; i += 10) {
                if (getDistance(lat, lon, routePoints[i][0], routePoints[i][1]) <= radius) {
                    isNear = true;
                    break;
                }
            }

            if (isNear) {
                const tags = el.tags || {};
                let tipo = "POI"; let sym = "Waypoint"; let color = "gray";

                if (tags.amenity === "drinking_water" || tags.natural === "spring" || tags.man_made === "water_tap") {
                    tipo = "Agua"; sym = "Drinking Water"; color = "blue";
                } else if (tags.amenity === "shelter" || tags.tourism === "alpine_hut") {
                    tipo = "Refugio"; sym = "Lodge"; color = "purple";
                } else if (tags.tourism === "viewpoint" || tags.natural === "peak") {
                    tipo = "Vistas"; sym = "Scenic Area"; color = "green";
                }

                const dot = L.circleMarker([lat, lon], {radius: 8, color: color, fillOpacity: 0.8}).addTo(map);
                const nombre = tags.name || tipo;
                
                dot.bindPopup(`<b>${nombre}</b><br><small>${tipo}</small><br><button onclick="window.borrar(${el.id})">Descartar</button>`);
                
                pois.push({ id: el.id, lat: lat, lon: lon, nombre: nombre, sym: sym, marker: dot });
            }
        });

        statusBox.innerText = `Escaneo finalizado. Añadidos ${pois.length} lugares a tu ruta.`;
    }

    window.borrar = function(id) {
        const idx = pois.findIndex(p => p.id === id);
        if (idx > -1) {
            map.removeLayer(pois[idx].marker);
            pois.splice(idx, 1);
            statusBox.innerText = `Punto descartado. Quedan ${pois.length} lugares.`;
        }
    };

    function descargarGPX() {
        if (pois.length === 0) return alert("No hay puntos para descargar");
        
        const waypointsXml = pois.map(p => `
    <wpt lat="${p.lat}" lon="${p.lon}">
        <name>${p.nombre.replace(/[&<>"']/g, "")}</name>
        <sym>${p.sym}</sym>
    </wpt>`).join("");

        const finalContent = originalXml.replace('</gpx>', waypointsXml + '\n</gpx>');
        const blob = new Blob([finalContent], {type: 'application/gpx+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "ruta_enriquecida.gpx";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
</body>
</html>
