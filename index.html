<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPX Pro Explorer - Motor BBox Avanzado</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #controls { padding: 15px; background: #2c3e50; color: white; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; border-bottom: 3px solid #1a252f; }
        #map { flex-grow: 1; }
        .status { font-size: 0.85em; background: #34495e; padding: 5px 10px; border-radius: 4px; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; }
        .btn-search { background: #3498db; color: white; }
        .btn-search:hover { background: #2980b9; }
        .btn-download { background: #27ae60; color: white; }
        .btn-download:hover { background: #219653; }
        .filter-group { display: flex; gap: 10px; background: #34495e; padding: 8px; border-radius: 4px; flex-wrap: wrap; }
        .custom-icon div { 
            font-size: 16px; background: white; border: 2px solid #2c3e50; 
            border-radius: 50%; width: 28px; height: 28px; 
            display: flex; justify-content: center; align-items: center; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.4); 
        }
        .popup-link { display: inline-block; margin-top: 8px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .popup-link:hover { text-decoration: underline; }
        .popup-btn-desc { margin-top: 10px; width: 100%; background: #e74c3c; color: white; padding: 5px; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="gpxFile" accept=".gpx">
    
    <select id="radius">
        <option value="5000">Radio 5 km</option>
        <option value="10000">Radio 10 km</option>
    </select>

    <div class="filter-group">
        <label><input type="checkbox" id="chk-agua" checked> 💧 Agua/Fuentes</label>
        <label><input type="checkbox" id="chk-refugio" checked> 🛖 Refugios</label>
        <label><input type="checkbox" id="chk-camping" checked> ⛺ Acampada</label>
        <label><input type="checkbox" id="chk-museo"> 🏛️ Museos</label>
        <label><input type="checkbox" id="chk-cascada"> 🌊 Cascadas</label>
        <label><input type="checkbox" id="chk-super"> 🛒 Tiendas/Supermercados</label>
    </div>

    <button class="btn-search" onclick="buscarPOIs()">Escanear Ruta (BBox)</button>
    <button class="btn-download" onclick="descargarGPX()">Guardar para Garmin</button>
    <div id="status" class="status">Carga un archivo GPX</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([40.41, -3.70], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let routePoints = [];
    let pois = [];
    let originalXml = null;
    let trackLayer = null;
    const statusBox = document.getElementById('status');

    const servers = [
        "https://overpass-api.de/api/interpreter",
        "https://overpass.openstreetmap.fr/api/interpreter",
        "https://lz4.overpass-api.de/api/interpreter"
    ];

    document.getElementById('gpxFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            originalXml = event.target.result;
            const parser = new DOMParser();
            const xml = parser.parseFromString(originalXml, "text/xml");
            const pts = xml.getElementsByTagName("trkpt");
            
            routePoints = Array.from(pts).map(p => [
                parseFloat(p.getAttribute("lat")),
                parseFloat(p.getAttribute("lon"))
            ]);

            if (trackLayer) map.removeLayer(trackLayer);
            trackLayer = L.polyline(routePoints, {color: '#e74c3c', weight: 5}).addTo(map);
            map.fitBounds(trackLayer.getBounds());
            statusBox.innerText = "Ruta cargada (" + routePoints.length + " puntos)";
        };
        reader.readAsText(e.target.files[0]);
    });

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const rad = Math.PI / 180;
        const dLat = (lat2 - lat1) * rad;
        const dLon = (lon2 - lon1) * rad;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * rad) * Math.cos(lat2 * rad) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    async function buscarPOIs() {
        if (!routePoints.length) return alert("Sube la ruta primero");
        
        statusBox.innerText = "Calculando área delimitadora...";
        const radius = parseInt(document.getElementById('radius').value);
        
        let minLat = 90, maxLat = -90, minLon = 180, maxLon = -180;
        routePoints.forEach(p => {
            if (p[0] < minLat) minLat = p[0];
            if (p[0] > maxLat) maxLat = p[0];
            if (p[1] < minLon) minLon = p[1];
            if (p[1] > maxLon) maxLon = p[1];
        });

        const margin = (radius / 111000) + 0.01; 
        const bbox = `${minLat - margin},${minLon - margin},${maxLat + margin},${maxLon + margin}`;

        let filtros = "";
        if (document.getElementById('chk-agua').checked) {
            filtros += `node["amenity"~"drinking_water|water_point"](${bbox});`;
            filtros += `node["natural"="spring"](${bbox});`;
            filtros += `node["man_made"="water_tap"](${bbox});`;
        }
        if (document.getElementById('chk-refugio').checked) {
            filtros += `node["amenity"="shelter"](${bbox});`;
            filtros += `node["tourism"~"alpine_hut|wilderness_hut"](${bbox});`;
        }
        if (document.getElementById('chk-camping').checked) {
            filtros += `node["tourism"~"camp_site|camp_pitch"](${bbox});`;
            filtros += `node["backcountry"="yes"](${bbox});`;
        }
        if (document.getElementById('chk-museo').checked) {
            filtros += `node["tourism"="museum"](${bbox});`;
        }
        if (document.getElementById('chk-cascada').checked) {
            filtros += `node["waterway"="waterfall"](${bbox});`;
        }
        if (document.getElementById('chk-super').checked) {
            filtros += `node["shop"~"supermarket|convenience"](${bbox});`;
        }

        if (!filtros) return alert("Selecciona al menos un filtro");

        const query = `[out:json][timeout:60];(${filtros});out center;`;
        
        let data = null;
        for (const url of servers) {
            statusBox.innerText = `Consultando servidor: ${url.split('//')[1].split('/')[0]}...`;
            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "data=" + encodeURIComponent(query)
                });
                if (res.ok) {
                    data = await res.json();
                    break;
                }
            } catch (err) { console.log("Fallo en", url); }
        }

        if (!data || !data.elements) {
            return statusBox.innerText = "Error: Todos los servidores están saturados.";
        }

        statusBox.innerText = `Filtrando ${data.elements.length} resultados por distancia...`;
        
        pois.forEach(p => map.removeLayer(p.marker));
        pois = [];

        data.elements.forEach(el => {
            const lat = el.lat || (el.center && el.center.lat);
            const lon = el.lon || (el.center && el.center.lon);
            if (!lat || !lon) return;

            let isNear = false;
            for (let i = 0; i < routePoints.length; i += 10) {
                if (getDistance(lat, lon, routePoints[i][0], routePoints[i][1]) <= radius) {
                    isNear = true;
                    break;
                }
            }

            if (isNear) {
                const tags = el.tags || {};
                let tipo = "POI"; let sym = "Waypoint"; let emoji = "📍";

                if (tags.amenity === "drinking_water" || tags.natural === "spring" || tags.man_made === "water_tap" || tags.amenity === "water_point") {
                    tipo = "Agua"; sym = "Drinking Water"; emoji = "💧";
                } else if (tags.amenity === "shelter" || tags.tourism === "alpine_hut" || tags.tourism === "wilderness_hut") {
                    tipo = "Refugio"; sym = "Lodge"; emoji = "🛖";
                } else if (tags.tourism === "camp_site" || tags.tourism === "camp_pitch" || tags.backcountry === "yes") {
                    tipo = "Acampada"; sym = "Campground"; emoji = "⛺";
                } else if (tags.tourism === "museum") {
                    tipo = "Museo"; sym = "Museum"; emoji = "🏛️";
                } else if (tags.waterway === "waterfall") {
                    tipo = "Cascada"; sym = "Waterfall"; emoji = "🌊";
                } else if (tags.shop === "supermarket" || tags.shop === "convenience") {
                    tipo = "Supermercado"; sym = "Grocery Store"; emoji = "🛒";
                }

                const markerIcon = L.divIcon({
                    className: 'custom-icon',
                    html: `<div>${emoji}</div>`,
                    iconSize: [32, 32],
                    iconAnchor: [16, 16]
                });

                const dot = L.marker([lat, lon], {icon: markerIcon}).addTo(map);
                const nombre = tags.name || tipo;
                
                // Generamos el enlace a Google Maps usando las coordenadas
                const gmapsLink = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
                
                dot.bindPopup(`
                    <b style="font-size:1.1em;">${nombre}</b><br>
                    <small style="color:#555;">${tipo}</small><br>
                    <small style="font-family:monospace; background:#eee; padding:2px 4px; border-radius:3px;">${lat.toFixed(5)}, ${lon.toFixed(5)}</small><br>
                    <a href="${gmapsLink}" target="_blank" class="popup-link">Abrir en Google Maps ↗</a><br>
                    <button class="popup-btn-desc" onclick="window.borrar(${el.id})">Descartar de la ruta</button>
                `);
                
                pois.push({ id: el.id, lat: lat, lon: lon, nombre: nombre, sym: sym, marker: dot });
            }
        });

        statusBox.innerText = `Escaneo finalizado. Añadidos ${pois.length} lugares a tu ruta.`;
    }

    window.borrar = function(id) {
        const idx = pois.findIndex(p => p.id === id);
        if (idx > -1) {
            map.removeLayer(pois[idx].marker);
            pois.splice(idx, 1);
            statusBox.innerText = `Punto descartado. Quedan ${pois.length} lugares.`;
        }
    };

    function descargarGPX() {
        if (pois.length === 0) return alert("No hay puntos para descargar");
        
        const waypointsXml = pois.map(p => `
    <wpt lat="${p.lat}" lon="${p.lon}">
        <name>${p.nombre.replace(/[&<>"']/g, "")}</name>
        <sym>${p.sym}</sym>
    </wpt>`).join("");

        const finalContent = originalXml.replace('</gpx>', waypointsXml + '\n</gpx>');
        const blob = new Blob([finalContent], {type: 'application/gpx+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "ruta_enriquecida_pro.gpx";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
</body>
</html>
