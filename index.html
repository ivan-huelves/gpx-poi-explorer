<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPX POI Explorer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #controls { padding: 15px; background: #f4f4f4; border-bottom: 1px solid #ccc; display: flex; gap: 20px; flex-wrap: wrap; }
        #map { flex-grow: 1; }
        .poi-item { font-size: 12px; }
        button { cursor: pointer; padding: 8px 12px; }
    </style>
</head>
<body>

<div id="controls">
    <div>
        <strong>1. Subir GPX:</strong>
        <input type="file" id="gpxFile" accept=".gpx">
    </div>
    <div>
        <strong>2. Radio:</strong>
        <select id="radius">
            <option value="1000">1 km</option>
            <option value="5000">5 km</option>
            <option value="10000">10 km</option>
        </select>
    </div>
    <div>
        <strong>3. Intereses:</strong>
        <label><input type="checkbox" value="viewpoint" checked> Miradores</label>
        <label><input type="checkbox" value="fountain"> Fuentes</label>
        <label><input type="checkbox" value="peak"> Picos</label>
        <label><input type="checkbox" value="museum"> Museos</label>
    </div>
    <button onclick="buscarPOIs()">Buscar Lugares</button>
    <button onclick="descargarGPX()" style="background: #e1f5fe;">Descargar GPX final</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gpxparser/0.0.10/GPXParser.min.js"></script>

<script>
    const map = L.map('map').setView([40.4167, -3.7037], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let routeCoordinates = [];
    let foundPOIs = [];
    let gpxRawData = null;

    document.getElementById('gpxFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            gpxRawData = event.target.result;
            const gpx = new gpxParser();
            gpx.parse(gpxRawData);
            
            routeCoordinates = gpx.tracks[0].points.map(p => [p.lat, p.lon]);
            const line = L.polyline(routeCoordinates, {color: 'blue'}).addTo(map);
            map.fitBounds(line.getBounds());
        };
        reader.readAsText(file);
    });

    async function buscarPOIs() {
        if (routeCoordinates.length === 0) return alert("Sube un GPX primero");
        
        const radius = document.getElementById('radius').value;
        const selectedTypes = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
        
        // Simplificamos la ruta para la búsqueda (un punto cada 1km aprox)
        const searchPoints = routeCoordinates.filter((_, i) => i % 20 === 0);
        
        foundPOIs = [];
        alert("Buscando... esto puede tardar unos segundos.");

        for (const [lat, lon] of searchPoints) {
            const typesQuery = selectedTypes.map(t => `node["tourism"="${t}"](around:${radius},${lat},${lon}); node["natural"="${t}"](around:${radius},${lat},${lon}); node["amenity"="${t}"](around:${radius},${lat},${lon});`).join("");
            
            const query = `[out:json];(${typesQuery});out body;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                data.elements.forEach(el => {
                    if (!foundPOIs.find(p => p.id === el.id)) {
                        foundPOIs.push(el);
                        addMarker(el);
                    }
                });
            } catch (e) { console.error("Error en Overpass", e); }
        }
    }

    function addMarker(poi) {
        const marker = L.marker([poi.lat, poi.lon]).addTo(map);
        const name = poi.tags.name || "Lugar sin nombre";
        marker.bindPopup(`
            <b>${name}</b><br>
            <button onclick="descartarPOI(${poi.id}, this)">Descartar</button>
        `);
        poi.marker = marker;
    }

    window.descartarPOI = function(id) {
        const index = foundPOIs.findIndex(p => p.id === id);
        if (index > -1) {
            map.removeLayer(foundPOIs[index].marker);
            foundPOIs.splice(index, 1);
        }
    };

    function descargarGPX() {
        let waypointsXml = foundPOIs.map(p => `
    <wpt lat="${p.lat}" lon="${p.lon}">
        <name>${p.tags.name || "Interés"}</name>
    </wpt>`).join("");

        // Insertamos los waypoints antes del final del archivo original
        const finalGpx = gpxRawData.replace('</gpx>', waypointsXml + '\n</gpx>');
        
        const blob = new Blob([finalGpx], {type: 'application/gpx+xml'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "ruta_con_puntos.gpx";
        a.click();
    }
</script>
</body>
</html>
